<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artigo - Clínica Ishizava</title>

    <link href="https://fonts.googleapis.com/css2?family=Julius+Sans+One&family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style/main.css">
    <link rel="stylesheet" href="style/artigo.css">
</head>
<body>
    <header class="header">
        <div class="header-container">
            <div class="logo-area">
                <a href="index.html" title="Voltar ao início"><img src="imagens/logo1.png" class="logo" alt="Logo Clínica Ishizava - Tratamento da Dor Crônica"></a>
                <span class="titulo-clinica">CLÍNICA ISHIZAVA</span>
            </div>
            <nav class="menu">
                <a href="index.html#sobre">Sobre</a>
                <a href="index.html#servicos">Serviços</a>
                <a href="index.html#blog">Artigos</a>
                <a href="index.html#contato" class="btn-contato button-primary"><i class="fa-solid fa-phone"></i> Contato</a>
            </nav>
        </div>
    </header>

    <section class="artigo-section" id="artigo-section">
        <div class="artigo-bg-overlay"></div>
        <div class="artigo-completo" id="artigo-container">
            <p class="artigo-carregando">Carregando artigo...</p>
        </div>
    </section>

    <footer class="footer">
        <div class="footer-social">
            <a href="https://www.instagram.com/dr.rishizava.dor/" target="_blank" rel="noopener noreferrer" aria-label="Instagram profissional"><i class="fa-brands fa-instagram fa-2x"></i></a>
            <a href="https://www.instagram.com/renatotakeshi/" target="_blank" rel="noopener noreferrer" aria-label="Instagram pessoal"><i class="fa-brands fa-instagram fa-2x"></i></a>
            <a href="https://www.facebook.com/renato.ishizava/" target="_blank" rel="noopener noreferrer" aria-label="Facebook"><i class="fa-brands fa-facebook fa-2x"></i></a>
            <a href="https://www.linkedin.com/in/renato-takeshi-ishizava-b25558142/" target="_blank" rel="noopener noreferrer" aria-label="LinkedIn"><i class="fa-brands fa-linkedin fa-2x"></i></a>
        </div>
        <p>© 2026 Clínica Ishizava — Desenvolvido por CRV Soluções em TI</p>
    </footer>

    <script src="js/main.js"></script>
    <script>
        function carregarArtigo() {
            const params = new URLSearchParams(window.location.search);
            const slug = params.get('slug');
            const container = document.getElementById('artigo-container');
            const section = document.getElementById('artigo-section');
            const artigo = ARTIGOS.find(a => a.slug === slug);

            if (!artigo) {
                container.innerHTML = `
                    <div class="artigo-nao-encontrado">
                        <h1>Artigo não encontrado</h1>
                        <p>Desculpe, este artigo não está disponível.</p>
                        <a href="index.html#blog" class="button-primary voltar-btn">
                            <i class="fa-solid fa-arrow-left"></i> Voltar ao Blog
                        </a>
                    </div>`;
                return;
            }

            section.style.backgroundImage = `url('${artigo.fundo || 'imagens/fundo1.png'}')`;
            document.title = artigo.titulo + ' - Clínica Ishizava';

            const dataFormatada = artigo.data
                ? new Date(artigo.data + 'T12:00:00').toLocaleDateString('pt-BR', { day: '2-digit', month: 'long', year: 'numeric' })
                : '';

            container.innerHTML = `
                <div class="artigo-topo">
                    <a href="index.html#blog" class="voltar-topo">
                        <i class="fa-solid fa-arrow-left"></i> Voltar aos artigos
                    </a>
                </div>

                <h1 class="artigo-titulo">${artigo.titulo}</h1>

                <div class="artigo-divisor">
                    <span class="divisor-linha"></span>
                    <span class="divisor-icone"><i class="fa-solid fa-leaf"></i></span>
                    <span class="divisor-linha"></span>
                </div>

                <div class="artigo-meta">
                    <span><i class="fa-solid fa-calendar-days"></i> ${dataFormatada}</span>
                    <span class="meta-sep">·</span>
                    <span><i class="fa-solid fa-user-doctor"></i> ${artigo.autor}</span>
                </div>

                <div class="artigo-img-wrapper">
                    <img src="${artigo.imagem}" alt="${artigo.titulo}" class="artigo-img" loading="lazy">
                </div>

                <div class="artigo-conteudo">${artigo.conteudo}</div>

                <div class="artigo-rodape">
                    <a href="index.html#blog" class="button-primary voltar-btn">
                        <i class="fa-solid fa-arrow-left"></i> Voltar ao Blog
                    </a>
                </div>`;
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', carregarArtigo);
        } else {
            carregarArtigo();
        }
    </script>
</body>
</html>
