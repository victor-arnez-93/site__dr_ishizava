<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artigo - Clínica Ishizava</title>

    <!-- GOOGLE FONTS -->
    <link href="https://fonts.googleapis.com/css2?family=Julius+Sans+One&family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- FONTAWESOME -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- CSS -->
    <link rel="stylesheet" href="style/main.css">

    <style>
        .artigo-completo {
            max-width: 800px;
            margin: 60px auto;
            padding: 40px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 14px rgba(0,0,0,0.08);
        }

        .artigo-completo h1 {
            color: #0B1822;
            margin-bottom: 20px;
            font-size: 2.5rem;
            line-height: 1.3;
        }

        .artigo-meta {
            color: #78A06D;
            font-size: 0.95rem;
            margin-bottom: 30px;
            border-bottom: 1px solid #eee;
            padding-bottom: 20px;
        }

        /* ── CONTEÚDO DO ARTIGO ── */
        .artigo-conteudo {
            color: #333;
            line-height: 1.9;
            font-size: 1.1rem;
            text-align: justify;
        }

        .artigo-conteudo p {
            margin-bottom: 22px;
        }

        .artigo-conteudo h3 {
            color: #0B1822;
            font-size: 1.3rem;
            margin-top: 36px;
            margin-bottom: 14px;
            padding-bottom: 8px;
            border-bottom: 2px solid #78A06D;
            text-align: left;
        }

        .artigo-conteudo ol,
        .artigo-conteudo ul {
            margin: 0 0 22px 28px;
            padding: 0;
            text-align: left;
        }

        .artigo-conteudo li {
            margin-bottom: 12px;
            line-height: 1.8;
        }

        .artigo-conteudo strong {
            color: #0B1822;
        }

        /* ── BOTÃO WHATSAPP ── */
        .btn-whatsapp-artigo {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background-color: #25D366;
            color: #fff !important;
            padding: 14px 28px;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 600;
            text-decoration: none;
            margin: 30px 0 20px 0;
            transition: background 0.2s, transform 0.2s;
        }

        .btn-whatsapp-artigo:hover {
            background-color: #1ebe5d;
            transform: scale(1.03);
        }

        .btn-whatsapp-artigo i {
            font-size: 1.3rem;
        }

        /* ── ASSINATURA ── */
        .assinatura {
            margin-top: 28px;
            padding-top: 18px;
            border-top: 1px solid #eee;
            color: #555;
            font-size: 0.95rem;
            font-style: italic;
            text-align: left !important;
        }

        /* ── VOLTAR ── */
        .voltar-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-top: 30px;
        }

        /* ── NÃO ENCONTRADO ── */
        .artigo-nao-encontrado {
            max-width: 800px;
            margin: 100px auto;
            text-align: center;
            padding: 40px;
        }

        .artigo-nao-encontrado h1 {
            color: #0B1822;
            margin-bottom: 30px;
            font-size: 2rem;
        }

        /* ── RESPONSIVO ── */
        @media (max-width: 600px) {
            .artigo-completo {
                padding: 24px 16px;
                margin: 20px 10px;
            }
            .artigo-completo h1 {
                font-size: 1.6rem;
            }
            .artigo-conteudo {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>

    <!-- HEADER -->
    <header class="header">
        <div class="header-container">
            <div class="logo-area">
                <img src="imagens/logo1.png" class="logo" alt="Logo Clínica Ishizava">
                <span class="titulo-clinica">CLÍNICA ISHIZAVA</span>
            </div>
            <nav class="menu">
                <a href="index.html#sobre">Sobre</a>
                <a href="index.html#servicos">Serviços</a>
                <a href="index.html#blog">Artigos</a>
                <a href="index.html#contato" class="btn-contato button-primary"><i class="fa-solid fa-phone"></i> Contato</a>
            </nav>
        </div>
    </header>

    <!-- ARTIGO -->
    <section class="fundo1" style="padding: 60px 0;">
        <div class="artigo-completo" id="artigo-container">
            <h1>Carregando artigo...</h1>
        </div>
    </section>

    <!-- FOOTER -->
    <footer class="footer">
        <div class="footer-social">
            <a href="https://www.instagram.com/dr.rishizava.dor/" target="_blank" rel="noopener noreferrer" aria-label="Instagram profissional">
                <i class="fa-brands fa-instagram fa-2x"></i>
            </a>
            <a href="https://www.instagram.com/renatotakeshi/" target="_blank" rel="noopener noreferrer" aria-label="Instagram pessoal">
                <i class="fa-brands fa-instagram fa-2x"></i>
            </a>
            <a href="https://www.facebook.com/renato.ishizava/" target="_blank" rel="noopener noreferrer" aria-label="Facebook">
                <i class="fa-brands fa-facebook fa-2x"></i>
            </a>
            <a href="https://www.linkedin.com/in/renato-takeshi-ishizava-b25558142/" target="_blank" rel="noopener noreferrer" aria-label="LinkedIn">
                <i class="fa-brands fa-linkedin fa-2x"></i>
            </a>
        </div>
        <p>© 2025 Clínica Ishizava — Desenvolvido por CRV Soluções em TI</p>
    </footer>

    <script>
        // URL CSV — com gid=0&single=true para garantir a aba correta
        const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vT2QtZrlZdSIo5Bb5Jc24boSav8yo1WCq786jXIc1SppJjtOPeV-vb6_vk4V_ts1uOVPJCUJKmjqqpQ/pub?gid=867322997&single=true&output=csv';

        // Parse CSV robusto (suporta quebras de linha e aspas duplas dentro de campos)
        function parseCSV(csv) {
            const linhas = [];
            let atual = '';
            let dentroAspas = false;

            for (let i = 0; i < csv.length; i++) {
                const c = csv[i];
                if (c === '"') {
                    if (dentroAspas && csv[i + 1] === '"') { atual += '"'; i++; }
                    else dentroAspas = !dentroAspas;
                } else if ((c === '\n' || c === '\r') && !dentroAspas) {
                    if (c === '\r' && csv[i + 1] === '\n') i++;
                    linhas.push(atual);
                    atual = '';
                } else {
                    atual += c;
                }
            }
            if (atual) linhas.push(atual);

            const cabecalho = linhas[0].split(',').map(h => h.replace(/(^"|"$)/g, '').trim());

            return linhas.slice(1).filter(l => l.trim()).map(linha => {
                const partes = [];
                let campo = '';
                let aspas = false;
                for (let i = 0; i < linha.length; i++) {
                    const c = linha[i];
                    if (c === '"') {
                        if (aspas && linha[i + 1] === '"') { campo += '"'; i++; }
                        else aspas = !aspas;
                    } else if (c === ',' && !aspas) {
                        partes.push(campo);
                        campo = '';
                    } else {
                        campo += c;
                    }
                }
                partes.push(campo);
                const obj = {};
                cabecalho.forEach((col, i) => obj[col] = partes[i] ?? '');
                return obj;
            });
        }

        // Carregar artigo individual
        function carregarArtigo() {
            const params = new URLSearchParams(window.location.search);
            const slug = params.get('slug');
            const container = document.getElementById("artigo-container");

            fetch(csvUrl)
                .then(r => r.text())
                .then(t => {
                    const artigos = parseCSV(t);
                    const artigo = artigos.find(a => a.slug === slug);

                    if (!artigo) {
                        container.innerHTML = `
                            <div class="artigo-nao-encontrado">
                                <h1>Artigo não encontrado</h1>
                                <p>Desculpe, este artigo não está disponível.</p>
                                <a href="index.html#blog" class="button-primary voltar-btn">
                                    <i class="fa-solid fa-arrow-left"></i> Voltar ao Blog
                                </a>
                            </div>`;
                        return;
                    }

                    // Atualiza o título da aba do navegador
                    document.title = artigo.titulo + ' - Clínica Ishizava';

                    // Formata a data em português
                    const dataFormatada = artigo.data
                        ? new Date(artigo.data + 'T12:00:00').toLocaleDateString('pt-BR', { day: '2-digit', month: 'long', year: 'numeric' })
                        : '';

                    container.innerHTML = `
                        <h1>${artigo.titulo}</h1>
                        <div class="artigo-meta">
                            <i class="fa-solid fa-calendar-days"></i> ${dataFormatada}
                            &nbsp;|&nbsp;
                            <i class="fa-solid fa-user-doctor"></i> ${artigo.autor}
                        </div>
                        ${artigo.imagem ? `<img src="${artigo.imagem}" style="width:100%; border-radius:12px; margin: 30px 0;" alt="${artigo.titulo}" loading="lazy">` : ''}
                        <div class="artigo-conteudo">${artigo.conteudo}</div>
                        <a href="index.html#blog" class="button-primary voltar-btn">
                            <i class="fa-solid fa-arrow-left"></i> Voltar ao Blog
                        </a>`;
                })
                .catch(err => {
                    console.error('Erro:', err);
                    container.innerHTML = '<p style="text-align:center;color:#999;">Erro ao carregar artigo. Tente novamente mais tarde.</p>';
                });
        }

        // Executar ao carregar
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', carregarArtigo);
        } else {
            carregarArtigo();
        }
    </script>
</body>
</html>
